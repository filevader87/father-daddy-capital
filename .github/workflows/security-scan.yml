name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Run weekly

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety snyk-python

      - name: Run Bandit SAST
        run: |
          bandit -r src/ -f json -o bandit-results.json
          bandit -r src/ -f txt -o bandit-results.txt

      - name: Run Safety check
        run: |
          safety check -r requirements.txt --json > safety-results.json
          safety check -r requirements.txt > safety-results.txt

      - name: Run Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --all-projects --json > snyk-results.json
          snyk test --all-projects > snyk-results.txt

      - name: Upload security scan results
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-results
          path: |
            bandit-results.*
            safety-results.*
            snyk-results.*

  container-scan:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t father-daddy-capital:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'father-daddy-capital:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Snyk container scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk container test father-daddy-capital:latest --file=Dockerfile

  dependabot:
    runs-on: ubuntu-latest
    needs: [security-scan, container-scan]
    steps:
      - name: Enable Dependabot
        uses: dependabot/dependabot-core@v3
        with:
          package-manager: "pip"
          update-schedule: "weekly"
          target-branch: "main"
          labels: "dependencies,security"
          commit-message: "chore(deps): update dependencies"
          reviewers: "maintainers"
          assignees: "maintainers" 